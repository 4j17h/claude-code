name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed baseline
        run: bash scripts/verify-setup.sh --repo-only

      - name: Validate bash syntax
        run: bash -n scripts/setup-macos.sh scripts/verify-setup.sh scripts/claude-api-mode.sh scripts/claude-batch-mode.sh scripts/claude-batch-commit-mode.sh scripts/claude-batch-isolated-mode.sh scripts/claude-batch-json-mode.sh scripts/claude-batch-stream-json-mode.sh scripts/claude-budget-mode.sh scripts/claude-plan-mode.sh scripts/claude-autopilot-lite.sh scripts/claude-autopilot-worktree.sh scripts/start-usage-dashboard.sh

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify committed baseline
        shell: pwsh
        run: .\scripts\verify-setup.ps1 -RepoOnly

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = @(
            'scripts\setup-windows.ps1',
            'scripts\verify-setup.ps1',
            'scripts\claude-api-mode.ps1',
            'scripts\claude-batch-mode.ps1',
            'scripts\claude-batch-commit-mode.ps1',
            'scripts\claude-batch-isolated-mode.ps1',
            'scripts\claude-batch-json-mode.ps1',
            'scripts\claude-batch-stream-json-mode.ps1',
            'scripts\claude-budget-mode.ps1',
            'scripts\claude-plan-mode.ps1',
            'scripts\claude-autopilot-lite.ps1',
            'scripts\claude-autopilot-worktree.ps1',
            'scripts\start-usage-dashboard.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Join-Path $PWD $file), [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }